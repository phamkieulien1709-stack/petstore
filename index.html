<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPET × PAPET — Quản Lý Nội Bộ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6F0; --surface:#FFFFFF; --ink:#16302C; --ink-soft:#4E6461; --muted:#7C8B87; --line:#E2E6DC;
  --sidebar:#123330; --sidebar-soft:#1D4642; --sidebar-line:#2A524D; --sidebar-text:#BFD8D2;
  --accent:#F2637B; --accent-ink:#7A1F30; --accent-soft:#FDE4E9;
  --marigold:#E8A33D; --marigold-soft:#FBEBD1;
  --teal:#2F8F7A; --teal-soft:#DCF0E9;
  --blue:#4C86C9; --blue-soft:#E1EBF7;
  --red:#E0554B; --red-soft:#FBE3E1;
  --radius:14px; --shadow:0 1px 2px rgba(18,51,48,.06), 0 8px 24px -12px rgba(18,51,48,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
.hidden{display:none !important;}

/* ---------------- LOGIN ---------------- */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(circle at 20% 20%,#1D4642 0%,#0F2624 55%,#0A1B19 100%);}
.login-card{background:var(--surface);border-radius:20px;padding:34px 32px;width:100%;max-width:380px;box-shadow:0 30px 60px -20px rgba(0,0,0,.5);}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.login-brand .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#F5899C);display:flex;align-items:center;justify-content:center;font-size:21px;box-shadow:0 4px 10px -3px rgba(242,99,123,.6);}
.login-brand .txt{font-family:'Baloo 2';font-weight:700;font-size:18px;}
.login-brand .txt span{display:block;font-family:'Inter';font-weight:500;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.login-card h2{font-family:'Baloo 2';font-size:17px;margin:0 0 4px;}
.login-card p.sub{font-size:12.5px;color:var(--muted);margin:0 0 20px;}
.login-card label{font-size:11.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:5px;}
.login-card input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-family:'Inter';font-size:13.5px;margin-bottom:14px;outline:none;}
.login-card input:focus{border-color:var(--accent);}
.login-err{background:var(--red-soft);color:#A3271F;font-size:12px;padding:8px 10px;border-radius:8px;margin-bottom:12px;display:none;}
.login-btn{width:100%;padding:11px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;font-size:13.5px;cursor:pointer;font-family:'Inter';}
.login-btn:hover{filter:brightness(1.05);}
.demo-accounts{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);}
.demo-accounts .lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.demo-row{display:flex;justify-content:space-between;align-items:center;background:#F4F6F0;border-radius:9px;padding:8px 10px;font-size:12px;margin-bottom:6px;cursor:pointer;}
.demo-row:hover{background:var(--accent-soft);}
.demo-row b{font-weight:700;}
.demo-row span{color:var(--muted);font-family:'JetBrains Mono';font-size:11px;}

/* ---------------- APP SHELL ---------------- */
.app{display:flex;min-height:100vh;}
.sidebar{width:264px;flex:none;background:var(--sidebar);color:var(--sidebar-text);padding:22px 14px 24px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:10px;padding:4px 10px 20px;}
.brand-mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#F5899C);display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;box-shadow:0 4px 10px -3px rgba(242,99,123,.6);}
.brand-text{font-family:'Baloo 2';font-weight:700;font-size:16.5px;color:#fff;line-height:1.15;}
.brand-text span{display:block;font-family:'Inter';font-weight:500;font-size:10.5px;letter-spacing:.09em;color:var(--sidebar-text);text-transform:uppercase;margin-top:2px;}
.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.11em;color:#7FA39C;padding:14px 12px 6px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13.6px;font-weight:500;color:var(--sidebar-text);margin-bottom:2px;transition:background .15s,color .15s;}
.nav-item .ic{font-size:15px;width:18px;text-align:center;flex:none;}
.nav-item:hover{background:var(--sidebar-soft);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;}
.role-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:var(--marigold);color:#4A2F04;margin-left:6px;vertical-align:middle;}
.role-tag.staff{background:var(--blue-soft);color:#1F4E82;}
.sidebar-foot{margin-top:16px;padding:12px;border-top:1px solid var(--sidebar-line);display:flex;gap:10px;align-items:center;}
.avatar-sm{width:32px;height:32px;border-radius:50%;background:var(--marigold);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Baloo 2';color:#4A2F04;flex:none;font-size:13px;}
.foot-name{font-size:12.5px;font-weight:600;color:#fff;}
.foot-role{font-size:11px;color:var(--sidebar-text);}
.logout-btn{margin-left:auto;background:none;border:none;color:var(--sidebar-text);cursor:pointer;font-size:15px;}
.logout-btn:hover{color:#fff;}
.menu-toggle{display:none;width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--line);align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex:none;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(10,20,18,.45);z-index:39;}
.sidebar-overlay.show{display:block;}

.main{flex:1;min-width:0;}
.topbar{position:sticky;top:0;z-index:5;background:rgba(244,246,240,.92);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line);}
.page-title{font-family:'Baloo 2';font-weight:700;font-size:21px;}
.page-sub{font-size:12.5px;color:var(--muted);margin-top:1px;}
.content{padding:26px 28px 60px;max-width:1320px;}
.section{display:none;}
.section.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
h2.h{font-family:'Baloo 2';font-size:17px;font-weight:700;margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
h2.h:first-child{margin-top:0;}

.grid{display:grid;gap:14px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1050px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.kpi .icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px;}
.kpi .val{font-family:'JetBrains Mono';font-weight:600;font-size:21px;letter-spacing:-.01em;}
.kpi .lbl{font-size:12px;color:var(--muted);margin-top:3px;}
.bg-pink{background:var(--accent-soft);color:var(--accent-ink);}
.bg-teal{background:var(--teal-soft);color:#175A49;}
.bg-blue{background:var(--blue-soft);color:#1F4E82;}
.bg-marigold{background:var(--marigold-soft);color:#7A5111;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:9px 10px;border-bottom:1.5px solid var(--line);}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.tblwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.tblwrap .scroller{overflow-x:auto;}

.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:100px;white-space:nowrap;}
.pill.silver{background:#EDEFEA;color:#5B6660;}
.pill.gold{background:var(--marigold-soft);color:#8A5C0C;}
.pill.platinum{background:#E7ECF7;color:#33447A;}
.pill.diamond{background:#E4F1FB;color:#0E5C8C;}
.pill.status-cho{background:#EFEFEF;color:#666;}
.pill.status-tam{background:var(--blue-soft);color:#1F4E82;}
.pill.status-cat{background:var(--accent-soft);color:var(--accent-ink);}
.pill.status-xong{background:var(--teal-soft);color:#175A49;}
.pill.ok{background:var(--teal-soft);color:#175A49;}
.pill.warn{background:var(--marigold-soft);color:#8A5C0C;}
.pill.danger{background:var(--red-soft);color:#A3271F;}

.btn{font-family:'Inter';font-weight:600;font-size:12.5px;border:none;border-radius:9px;padding:8px 14px;cursor:pointer;transition:filter .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);color:#fff;}
.btn.primary:hover{filter:brightness(1.05);}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}
.btn.ghost:hover{background:#F4F6F0;}
.btn.sm{padding:5px 9px;font-size:11.5px;border-radius:7px;}
.btn.danger{background:var(--red);color:#fff;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12.5px;min-width:220px;}
.search input{border:none;outline:none;font-family:'Inter';font-size:12.5px;flex:1;background:transparent;}
select,input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],input[type=tel],textarea{
  font-family:'Inter';font-size:12.5px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);outline:none;
}
select:focus,input:focus,textarea:focus{border-color:var(--accent);}
label.f{font-size:11.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{margin-bottom:2px;}
.field.full{grid-column:1/-1;}

/* wizard tabs (Thêm mới dịch vụ / Thêm mới hàng hóa) */
.wiztabs{display:flex;gap:6px;background:#F0F3EB;border-radius:10px;padding:4px;margin-bottom:16px;}
.wiztab-btn{flex:1;text-align:center;padding:9px 10px;border-radius:8px;font-family:'Inter';font-weight:700;font-size:12.5px;color:var(--ink-soft);cursor:pointer;border:none;background:transparent;transition:background .15s,color .15s;}
.wiztab-btn.active{background:#fff;color:var(--accent-ink);box-shadow:var(--shadow);}
.wiztab-pane{display:none;}
.wiztab-pane.active{display:block;animation:fade .2s ease;}

#toast{position:fixed;bottom:22px;right:22px;background:var(--sidebar);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:99;}
#toast.show{opacity:1;transform:none;}

.modal-bg{position:fixed;inset:0;background:rgba(16,35,32,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:16px;max-width:600px;width:100%;max-height:88vh;overflow-y:auto;padding:22px 24px;box-shadow:0 30px 60px -20px rgba(0,0,0,.35);}
.modal h3{font-family:'Baloo 2';margin:0 0 14px;font-size:18px;}
.modal-close{float:right;cursor:pointer;background:#F1F1EC;border:none;width:28px;height:28px;border-radius:8px;font-size:14px;}

.muted{color:var(--muted);}
.divider{height:1px;background:var(--line);margin:16px 0;}
.flex{display:flex;}
.gap8{gap:8px;}
.wrap{flex-wrap:wrap;}
.between{justify-content:space-between;}
.center{align-items:center;}
.mono{font-family:'JetBrains Mono';}
.small{font-size:11.5px;}
.bold{font-weight:700;}
a.linklike{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none;}
a.linklike:hover{text-decoration:underline;}

/* product / warehouse card */
.prodcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:1000px){.prodcards{grid-template-columns:repeat(2,1fr);}}
.pcard{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.pcard .thumb{height:110px;background:#F0F3EB;display:flex;align-items:center;justify-content:center;font-size:38px;overflow:hidden;}
.pcard .thumb img{width:100%;height:100%;object-fit:cover;}
.pcard .body{padding:10px 12px;}
.pcard .cat{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.pcard .name{font-weight:700;font-size:13px;margin:2px 0 4px;}
.pcard .price{font-family:'JetBrains Mono';font-size:13px;}
.pcard .actrow{display:flex;gap:6px;padding:0 12px 12px;}

/* kanban spa */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;overflow-x:auto;}
@media(max-width:1000px){.kanban{grid-template-columns:repeat(4,230px);}}
.kcol{background:#EFF2E9;border-radius:12px;padding:10px;min-height:120px;}
.kcol h4{font-size:12px;margin:2px 6px 8px;display:flex;justify-content:space-between;color:var(--ink-soft);}
.kcard{background:#fff;border-radius:10px;padding:10px;margin-bottom:8px;box-shadow:var(--shadow);font-size:12.5px;}
.kcard .name{font-weight:700;margin-bottom:2px;}
.kcard .meta{color:var(--muted);font-size:11px;margin-bottom:8px;}
.kcard select{width:100%;margin-bottom:6px;}
.photorow{display:flex;gap:6px;margin-top:6px;}
.photobox{flex:1;height:52px;border:1px dashed var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:var(--muted);cursor:pointer;overflow:hidden;position:relative;background:#FAFAF6;}
.photobox img{width:100%;height:100%;object-fit:cover;}
.photobox input{position:absolute;inset:0;opacity:0;cursor:pointer;}

/* customer/pet detail */
.chip-list{display:flex;gap:6px;flex-wrap:wrap;}
.chip{background:#F0F3EB;border-radius:100px;padding:4px 10px;font-size:11.5px;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#D6DACC;border-radius:8px;}

/* ============================= RESPONSIVE / MOBILE ============================= */
@media (max-width: 860px){
  .login-card{padding:26px 22px;border-radius:18px;}

  .menu-toggle{display:flex;}
  .sidebar{
    position:fixed;top:0;left:0;height:100vh;width:82vw;max-width:300px;
    z-index:40;transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:0 0 40px rgba(0,0,0,.35);
  }
  .sidebar.open{transform:translateX(0);}
  .main{width:100%;min-width:0;}

  .topbar{padding:12px 14px;gap:8px;}
  .page-title{font-size:16.5px;}
  .page-sub{display:none;}
  #whoami{display:none;}
  .content{padding:14px 14px 70px;}

  h2.h{font-size:15.5px;margin:20px 0 10px;}

  .grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:repeat(2,1fr);gap:10px;}
  .kpi{padding:14px;}
  .kpi .val{font-size:17px;}
  .kpi .lbl{font-size:11px;}

  .card{padding:14px;border-radius:12px;}

  .formgrid{grid-template-columns:1fr;gap:10px;}
  .field.full{grid-column:auto;}

  .prodcards{grid-template-columns:repeat(2,1fr);gap:10px;}
  .pcard .thumb{height:88px;font-size:28px;}
  .pcard .actrow{flex-wrap:wrap;}

  .rooms{grid-template-columns:repeat(3,1fr);gap:8px;}
  .room{padding:9px 7px;}

  .kanban{grid-template-columns:repeat(4,80vw);gap:10px;}
  .kcol{min-height:100px;}

  .pos-grid{grid-template-columns:1fr;}

  .notes-grid{grid-template-columns:repeat(2,1fr);}

  .toolbar{flex-direction:column;align-items:stretch;gap:10px;}
  .toolbar .btn, .toolbar .search{width:100%;justify-content:center;}
  .toolbar > div.small.muted{order:2;}

  table{font-size:12px;}
  th{font-size:10px;padding:8px 8px;}
  td{padding:8px 8px;}
  .tblwrap{border-radius:12px;}

  .btn{padding:10px 14px;font-size:13px;}
  .btn.sm{padding:7px 10px;font-size:12px;}

  .modal-bg{align-items:flex-end;padding:0;}
  .modal{max-width:100%;width:100%;border-radius:18px 18px 0 0;max-height:90vh;padding:20px 18px 24px;}

  .photorow{flex-direction:row;}
  .photobox{height:70px;}

  /* Prevent iOS auto-zoom on focus */
  input,select,textarea{font-size:16px;}
  .btn{font-size:14px;}
  .pill{font-size:11px;}
}

@media (max-width: 420px){
  .grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}
  .prodcards{grid-template-columns:1fr;}
  .notes-grid{grid-template-columns:1fr;}
  .rooms{grid-template-columns:repeat(2,1fr);}
  .kanban{grid-template-columns:repeat(4,86vw);}
}
</style>
</head>
<body>

<!-- ============= LOGIN SCREEN ============= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="mark">🐾</div>
      <div class="txt">CPET × PAPET<span>Quản lý nội bộ</span></div>
    </div>
    <h2>Đăng nhập</h2>
    <p class="sub">Nhập tài khoản để vào hệ thống quản lý.</p>
    <div class="login-err" id="loginErr">Sai tên đăng nhập hoặc mật khẩu.</div>
    <label>Tên đăng nhập</label>
    <input type="text" id="loginUser" placeholder="vd: admin">
    <label>Mật khẩu</label>
    <input type="password" id="loginPass" placeholder="••••••••">
    <button class="login-btn" onclick="doLogin()">Đăng nhập</button>
    <div class="demo-accounts">
      <div class="lbl">Tài khoản demo (bấm để điền nhanh)</div>
      <div class="demo-row" onclick="fillLogin('admin','admin123')"><b>👑 admin</b><span>admin123</span></div>
      <div class="demo-row" onclick="fillLogin('thao','123456')"><b>💼 thao (nhân viên)</b><span>123456</span></div>
    </div>
  </div>
</div>

<!-- ============= APP SHELL ============= -->
<div class="app hidden" id="appShell">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="topbar">
      <div class="flex gap8 center">
        <button class="menu-toggle" id="menuToggle" aria-label="Mở menu">☰</button>
        <div>
          <div class="page-title" id="pageTitle">Dashboard</div>
          <div class="page-sub" id="pageSub"></div>
        </div>
      </div>
      <div class="flex gap8 center">
        <span class="small muted" id="whoami"></span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBody"></div></div>

<script>
/* ============================= AUTH DATA ============================= */
const users = [
  {username:'admin', password:'admin123', role:'admin', name:'Quản trị viên', staffId:null},
  {username:'thao',  password:'123456',   role:'staff', name:'Nguyễn Thị Thảo', staffId:1},
  {username:'minh',  password:'123456',   role:'staff', name:'Đặng Văn Minh',   staffId:2},
];
let currentUser = null;

window.fillLogin=(u,p)=>{document.getElementById('loginUser').value=u;document.getElementById('loginPass').value=p;};
window.doLogin=()=>{
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  const found=users.find(x=>x.username===u && x.password===p);
  if(!found){document.getElementById('loginErr').style.display='block';return;}
  document.getElementById('loginErr').style.display='none';
  currentUser=found;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  document.getElementById('whoami').innerHTML=`Đăng nhập: <b>${found.name}</b> <span class="role-tag ${found.role==='staff'?'staff':''}">${found.role==='admin'?'ADMIN':'NHÂN VIÊN'}</span> &nbsp;·&nbsp; <a class="linklike" onclick="doLogout()">Đăng xuất</a>`;
  goTo(found.role==='admin'?'kinhdoanh':'phucvukh');
};
window.doLogout=()=>{
  currentUser=null;
  document.getElementById('appShell').classList.add('hidden');

function renderSidebar(active){
  const sb=document.getElementById('sidebar');
  const items=NAV_ALL.filter(it=>(!it.adminOnly || currentUser.role==='admin') && (!it.staffOnly || currentUser.role==='staff'));
  let html=`<div class="brand"><div class="brand-mark">🐾</div><div class="brand-text">CPET × PAPET<span>Quản lý nội bộ</span></div></div>`;
  html+=`<div class="nav-label">Chức năng</div>`;
  items.forEach(it=>{
    html+=`<div class="nav-item ${it.id===active?'active':''}" data-nav="${it.id}"><span class="ic">${it.icon}</span>${it.label}</div>`;
  });
  html+=`<div class="sidebar-foot"><div class="avatar-sm">${currentUser.name.split(' ').slice(-1)[0][0]}</div><div><div class="foot-name">${currentUser.name}</div><div class="foot-role">${currentUser.role==='admin'?'Quản trị viên':'Nhân viên'}</div></div><button class="logout-btn" title="Đăng xuất" onclick="doLogout()">⏻</button></div>`;
  sb.innerHTML=html;
  sb.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>goTo(el.dataset.nav)));
}
let currentSection='dashboard';
function closeSidebarDrawer(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}
function goTo(id){
  const allowed = NAV_ALL.find(n=>n.id===id);
  if(allowed && allowed.adminOnly && currentUser.role!=='admin'){toast('⛔ Bạn không có quyền truy cập mục này');return;}
  if(allowed && allowed.staffOnly && currentUser.role!=='staff'){toast('⛔ Mục này chỉ dành cho tài khoản nhân viên');return;}
  currentSection=id;
  document.getElementById('pageTitle').textContent=TITLES[id][0];
  document.getElementById('pageSub').textContent=TITLES[id][1];
  renderSidebar(id);
  renderSection(id);
  closeSidebarDrawer();
}

const staffByName = name => state.staff.find(s=>s.name===name);
function serviceByRefName(name){ return state.services.find(s=>s.name===name); }
function retailByRefName(name){ return state.retail.find(r=>retailView(r).name===name); }
function rateForStaff(item,staffId){
  if(!item) return 0;
  if(staffId!=null && item.staffRates && item.staffRates[staffId]!=null) return item.staffRates[staffId];
  return item.commissionRate||0;
}
function orderCommission(o){
  if(!o.staff || o.status==='Đã huỷ') return 0;
  const s=staffByName(o.staff); const staffId=s?s.id:null;
  if(o.type==='dichvu'){ const sv=serviceByRefName(o.refName); return Math.round(o.price*rateForStaff(sv,staffId)/100); }
  if(o.type==='hangban'){ const r=retailByRefName(o.refName); return Math.round(o.price*rateForStaff(r,staffId)/100); }
  return 0;
}
function jobParticipants(j){
  return [...new Set(Object.values(j.staff).filter(Boolean))];
}

RENDER.phucvukh = () => {
  const active = state.spaJobs.filter(j=>j.status!=='Hoàn thiện');
  const waiting = active.filter(j=>!j.staff[j.status]);
  const mine    = active.filter(j=>!waiting.includes(j) && j.staff[j.status]===currentUser.name);
  const others  = active.filter(j=>!waiting.includes(j) && !mine.includes(j));
  const ordered = [...waiting, ...mine, ...others];
  return `
  <div class="toolbar">
    <div class="small muted">Ca chưa có ai phụ trách ở khâu hiện tại hiển thị đầu tiên — bấm "Nhận việc" để nhận. Có thể "Nhả việc" bất cứ lúc nào để người khác nhận lại. Hoa hồng được tính theo % quy định riêng cho từng dịch vụ / hàng bán, ghi nhận cho nhân viên tiếp nhận đơn.</div>
    <button class="btn primary" onclick="openAddOrderWizard()">+ Thêm mới</button>
  </div>
  <div id="queueList">
    ${ordered.length ? ordered.map(queueCard).join('') : `<div class="card muted small">Không có ca nào đang chờ hoặc đang thực hiện.</div>`}
  </div>
  `;
};

function queueCard(j){
  const p=petById(j.petId), o=ownerById(p.ownerId), claimed=j.staff[j.status];
  const isMine = claimed===currentUser.name;
  const isWaitingOpen = !claimed;
  return `<div class="card" style="margin-bottom:10px;">
    <div class="flex between center wrap gap8">
      <div>
        <div class="bold">🐾 ${p.name} <span class="muted small">— ${o.name}</span></div>
        <div class="small muted">${j.service}${j.date?' · '+j.date:''}</div>
      </div>
      <div class="flex gap8 center">
        <span class="pill ${SPACLASS[j.status]}">${j.status}</span>
        ${isWaitingOpen ? `<button class="btn primary sm" onclick="claimSpaJob(${j.id})">🙋 Nhận việc</button>`
          : isMine ? `<span class="pill ok">✅ Bạn đang phụ trách</span><button class="btn ghost sm" onclick="releaseSpaJob(${j.id})">↩️ Nhả việc</button>`
          : `<span class="small muted">Đang được ${claimed||'—'} thực hiện</span>`}
      </div>
    </div>
    <div class="flex gap8 wrap" style="margin-top:10px;">
      ${SPASTAGES.map(s=>{
        const name=j.staff[s];
        const mine2=name===currentUser.name;
        return `<div class="chip" style="background:${name?(mine2?'var(--accent-soft)':'var(--teal-soft)'):'#F0F3EB'};${s===j.status?'border:1.5px solid var(--ink-soft);':''}">
          <b>${s}</b>: ${name?name:'<span class="muted">chưa nhận</span>'}
        </div>`;
      }).join('')}
    </div>
    ${isMine ? `
    <div class="divider"></div>
    <div class="formgrid">
      <div class="field">
        <label class="f">Cập nhật trạng thái</label>
        <select style="width:100%" onchange="advanceMyJob(${j.id},this.value)">
          ${SPASTAGES.map(s=>`<option ${s===j.status?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label class="f">Ảnh trước / sau</label>
        <div class="photorow" style="margin-top:0;">
          <div class="photobox">${j.before?`<img src="${j.before}">`:'Ảnh trước'}<input type="file" accept="image/*" onchange="setSpaPhoto(${j.id},'before',this)"></div>
          <div class="photobox">${j.after?`<img src="${j.after}">`:'Ảnh sau'}<input type="file" accept="image/*" onchange="setSpaPhoto(${j.id},'after',this)"></div>
        </div>
      </div>
    </div>` : ''}
  </div>`;
}
window.advanceMyJob=(id,status)=>{
  const j=state.spaJobs.find(x=>x.id===id);
  j.status=status;
  // Không tự gán người đang cập nhật vào khâu mới — mỗi khâu (Tắm/Cắt/Hoàn thiện...) cần được nhận riêng,
  // để đúng thực tế: khâu Tắm có thể là NV A, khâu Cắt lại là NV B.
  if(status==='Hoàn thiện'){ j.completedDate=j.completedDate||TODAY; if(j.orderId){const o=state.orders.find(x=>x.id===j.orderId); if(o)o.status='Hoàn thành';} toast('🎉 Đã chuyển sang Hoàn thiện — nếu chưa có người nhận, ca sẽ hiện lại ở hàng đợi'); }
  else { j.completedDate=null; toast('✅ Đã chuyển sang khâu "'+status+'" — khâu này đang chờ nhân viên nhận'); }
  renderSection(currentSection);
};
window.releaseSpaJob=(id)=>{
  const j=state.spaJobs.find(x=>x.id===id);
  if(j.staff[j.status]!==currentUser.name){toast('⚠️ Bạn không phụ trách khâu này');return;}
  j.staff[j.status]='';
  toast('↩️ Đã nhả khâu "'+j.status+'" của '+petById(j.petId).name+' — nhân viên khác có thể nhận lại');
  renderSection(currentSection);
};

window.switchWizTab=(tab)=>{
  ['dichvu','hanghoa'].forEach(t=>{

  });
};

function svcSelectedService(){
  const groupEl=document.getElementById('svc_combo_group');
  const petTypeEl=document.getElementById('svc_pet_type');
  const tierEl=document.getElementById('svc_tier');
  if(!groupEl||!petTypeEl||!tierEl) return null;
  return state.services.find(s=>s.comboGroup===groupEl.value && s.petType===petTypeEl.value && s.tier===tierEl.value);
}
window.onSvcQuickSearch=(val)=>{
  const svc=state.services.find(s=>s.comboGroup && s.comboGroup!=='khach_san' && s.name===val);
  const hint=document.getElementById('svc_quick_hint');
  if(!svc){
    hint.textContent = val ? '⚠️ Chưa khớp dịch vụ nào — gõ tiếp hoặc chọn thủ công bên dưới.' : 'Gõ để lọc trong danh sách gợi ý, hoặc chọn thủ công theo Loại combo / Loại thú / Mốc cân nặng bên dưới.';
    return;
  }
  document.getElementById('svc_combo_group').value=svc.comboGroup;
  onSvcComboGroupChange();
  document.getElementById('svc_pet_type').value=svc.petType;
  onSvcPetTypeChange();
  document.getElementById('svc_tier').value=svc.tier;
  onSvcTierChange();
  hint.innerHTML=`✅ Đã chọn: <b>${svc.name}</b> — ${vnd(svc.price)}`;
};
window.onSvcComboGroupChange=()=>{
  const group=document.getElementById('svc_combo_group').value;
  const petTypeSel=document.getElementById('svc_pet_type');
  const types=comboPetTypes(group);
  petTypeSel.innerHTML=types.map(t=>`<option value="${t}">${t}</option>`).join('');
  document.getElementById('svc_tier_label').textContent = (COMBO_GROUPS.find(g=>g.key===group)||{}).byPart ? 'Bộ phận' : 'Mốc cân nặng';
  onSvcPetTypeChange();
};
window.onSvcPetTypeChange=()=>{
  const group=document.getElementById('svc_combo_group').value;
  const petType=document.getElementById('svc_pet_type').value;
  const tierSel=document.getElementById('svc_tier');
  const tiers=comboTiers(group,petType);
  tierSel.innerHTML=tiers.map(t=>`<option value="${t.tier}">${t.tier} — ${vnd(t.price)}</option>`).join('');
  onSvcTierChange();
};
window.onSvcTierChange=()=>{
  const svc=svcSelectedService();
  const pct=+document.getElementById('svc_disc_percent').value||0;
  const amt=Math.round((svc?svc.price:0)*pct/100);
  document.getElementById('svc_disc_amount').value=amt;
  updateSvcPricePreview();
};
window.svcDiscPercentChange=(el)=>{
  const svc=svcSelectedService(); const price=svc?svc.price:0;
  const pct=Math.min(100,Math.max(0,+el.value||0));
  const amt=Math.round(price*pct/100);
  document.getElementById('svc_disc_amount').value=amt;
  updateSvcPricePreview();
};
window.svcDiscAmountChange=(el)=>{
  const svc=svcSelectedService(); const price=svc?svc.price:0;
  const amt=Math.max(0,+el.value||0);
  const pct = price? +(Math.min(amt,price)/price*100).toFixed(1) : 0;
  document.getElementById('svc_disc_percent').value=pct;
  updateSvcPricePreview();
};
function updateSvcPricePreview(){
  const svc=svcSelectedService();
  const price=svc?svc.price:0;
  const amt=+document.getElementById('svc_disc_amount').value||0;
  const final=Math.max(0,price-amt);
  document.getElementById('svc_price_preview').innerHTML = svc
    ? `Combo: <b>${svc.petType} · ${svc.tier}</b><br>Giá: <b>${vnd(price)}</b> → Sau chiết khấu: <b>${vnd(final)}</b>`
    : 'Chưa có combo phù hợp.';
}
window.toggleSvcCustMode=(mode)=>{
  document.getElementById('svcCustExistingWrap').classList.toggle('hidden',mode==='new');
  document.getElementById('svcCustNewWrap').classList.toggle('hidden',mode!=='new');
  if(mode==='new'){
    document.getElementById('svcPetExistingWrap').classList.add('hidden');
    document.getElementById('svcPetNewWrap').classList.remove('hidden');
  } else {
    document.getElementById('svcPetExistingWrap').classList.remove('hidden');
    populateSvcPetSelect();
  }
};
window.populateSvcPetSelect=()=>{
  const sel=document.getElementById('svc_pet_select');
  const custId=+document.getElementById('svc_cust_select').value;
  const myPets=state.pets.filter(p=>p.ownerId===custId);
  sel.innerHTML = myPets.map(p=>`<option value="${p.id}">${p.name} (${p.breed})</option>`).join('') + `<option value="__new__">+ Thú cưng mới...</option>`;
  toggleSvcPetNew();
};
window.toggleSvcPetNew=()=>{
  const sel=document.getElementById('svc_pet_select');
  document.getElementById('svcPetNewWrap').classList.toggle('hidden', sel.value!=='__new__');
};
window.svcPhotoChange=(input)=>{
  readImage(input,(dataUrl)=>{
    wizPhoto=dataUrl;
    document.getElementById('svc_photo_box').innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;"><input type="file" accept="image/*" onchange="svcPhotoChange(this)">`;
    toast('🖼️ Đã tải ảnh trước');
  });
};
window.submitService=()=>{
  const custMode=document.querySelector('input[name="svcCustMode"]:checked').value;
  let custId, custName;
  if(custMode==='new'){
    custName=document.getElementById('svc_cust_name').value.trim();
    if(!custName){toast('⚠️ Vui lòng nhập tên khách hàng mới');return;}
    custId=Math.max(0,...state.customers.map(c=>c.id))+1;
    state.customers.push({id:custId,name:custName,phone:document.getElementById('svc_cust_phone').value,address:'',email:'',tier:'Silver',points:0,bookings:[],history:[]});
  } else {
    custId=+document.getElementById('svc_cust_select').value;
    custName=ownerById(custId).name;
  }
  let petId, petSelVal=document.getElementById('svc_pet_select')?document.getElementById('svc_pet_select').value:'__new__';
  if(custMode==='new' || petSelVal==='__new__'){
    const petName=document.getElementById('svc_pet_name').value.trim();
    if(!petName){toast('⚠️ Vui lòng nhập tên thú cưng (mới)');return;}
    petId=Math.max(0,...state.pets.map(p=>p.id))+1;
    state.pets.push({id:petId,ownerId:custId,name:petName,breed:document.getElementById('svc_pet_breed').value,note:''});
  } else {
    petId=+petSelVal;
  }
  const svc=svcSelectedService();
  if(!svc){toast('⚠️ Vui lòng chọn combo dịch vụ hợp lệ (loại thú cưng / mốc cân nặng)');return;}
  const branch=document.getElementById('svc_branch').value;
  const discPercent=+document.getElementById('svc_disc_percent').value||0;
  const discAmount=Math.min(svc.price,+document.getElementById('svc_disc_amount').value||0);
  const finalPrice=Math.max(0,svc.price-discAmount);

  if(!wizPhoto){
    if(!confirm('Chưa có ảnh trước khi thực hiện dịch vụ. Vẫn tiếp tục?')) return;
  }

  const orderId=Math.max(...state.orders.map(o=>o.id))+1;
  state.orders.push({id:orderId,service:svc.name,price:finalPrice,branch,customer:custName,date:TODAY,status:'Đang xử lý',staff:currentUser.name,
    type:'dichvu',refName:svc.name,originalPrice:svc.price,discountAmount:discAmount,discountPercent:discPercent});
  svc.used++;

  // Ca Spa mới, khâu "Chờ" gán cho người tiếp nhận
  const jobId=Math.max(0,...state.spaJobs.map(j=>j.id))+1;
  state.spaJobs.push({id:jobId,petId,service:svc.name,status:'Chờ',
    staff:{'Chờ':currentUser.name,'Tắm':'','Cắt':'','Hoàn thiện':''},
    before:wizPhoto,after:'',date:TODAY,orderId,completedDate:null});

  closeModal();
  toast('✅ Đã tiếp nhận '+petById(petId).name+' — dịch vụ "'+svc.name+'" đang ở hàng đợi');
  renderSection('phucvukh');
};

   Thay vì liệt kê toàn bộ hàng hóa (chiếm nhiều diện tích, khó nhìn), người dùng gõ tìm
   và bấm "+ Thêm" — chỉ những mặt hàng đã chọn (tên, đơn giá, số lượng) mới hiển thị. */
let gdCart = []; // {retailId, qty}
function gdCartTotal(){
  return gdCart.reduce((sum,it)=>{
    const r=state.retail.find(x=>x.id===it.retailId); const rv=r?retailView(r):null;
    return sum + (rv?rv.sellPrice*it.qty:0);
  },0);
}

  <div class="small muted" id="gd_price_preview" style="margin-top:6px;"></div>

  <div style="margin-top:18px;text-align:right;"><button class="btn primary" onclick="submitGoods()">🛒 Bán hàng</button></div>`;

window.addGoodsToCart=()=>{
  const val=document.getElementById('gd_item_search').value.trim();
  const qtyWanted=Math.max(1,+document.getElementById('gd_item_qty').value||1);
  const r=state.retail.find(x=>retailView(x).name===val);
  if(!r){toast('⚠️ Không tìm thấy hàng hóa này — vui lòng chọn từ gợi ý khi gõ');return;}
  const rv=retailView(r);
  const existing=gdCart.find(it=>it.retailId===r.id);
  const already=existing?existing.qty:0;
  const maxAddable=rv.stock-already;
  if(maxAddable<=0){toast('⚠️ '+rv.name+' đã hết hàng trong kho hoặc đã đạt tồn kho tối đa trong giỏ');return;}
  const addQty=Math.min(qtyWanted,maxAddable);
  if(existing) existing.qty+=addQty; else gdCart.push({retailId:r.id,qty:addQty});
  document.getElementById('gd_item_search').value='';
  document.getElementById('gd_item_qty').value=1;
  renderGoodsCart();
  toast('✅ Đã thêm '+rv.name+(addQty<qtyWanted?' (chỉ còn '+addQty+' trong kho)':''));
};
window.removeGoodsFromCart=(retailId)=>{
  gdCart=gdCart.filter(it=>it.retailId!==retailId);
  renderGoodsCart();
};
window.updateGoodsCartQty=(retailId,val)=>{
  const r=state.retail.find(x=>x.id===retailId); const rv=r?retailView(r):null;
  const it=gdCart.find(x=>x.retailId===retailId);
  if(!it) return;
  let q=Math.floor(+val||0);
  if(rv) q=Math.min(q,rv.stock);
  if(q<=0){ gdCart=gdCart.filter(x=>x.retailId!==retailId); }
  else it.qty=q;
  renderGoodsCart();
};
function renderGoodsCart(){
  const wrap=document.getElementById('gd_cart_list');
  if(!wrap) return;
  if(!gdCart.length){
    wrap.innerHTML='<div class="muted small">Chưa chọn hàng hóa nào — tìm tên ở trên rồi bấm "+ Thêm".</div>';
  } else {
    wrap.innerHTML = gdCart.map(it=>{
      const r=state.retail.find(x=>x.id===it.retailId); const rv=r?retailView(r):{name:'(Đã xoá)',sellPrice:0,stock:0};
      return `<div class="flex between center" style="padding:7px 0;border-bottom:1px dashed var(--line);">
        <span class="small">${rv.name}<br><span class="muted">${vnd(rv.sellPrice)} / đơn vị</span></span>
        <div class="flex gap8 center">
          <input type="number" min="1" max="${rv.stock}" value="${it.qty}" style="width:56px;text-align:center;" onchange="updateGoodsCartQty(${it.retailId},this.value)">
          <span class="mono small" style="min-width:78px;text-align:right;">${vnd(rv.sellPrice*it.qty)}</span>
          <button type="button" class="btn ghost sm" onclick="removeGoodsFromCart(${it.retailId})">🗑️</button>
        </div>
      </div>`;
    }).join('');
  }
  onGoodsCartChange();
}
window.gdDiscPercentChange=(el)=>{
  const total=gdCartTotal();
  const pct=Math.min(100,Math.max(0,+el.value||0));
  const amt=Math.round(total*pct/100);
  document.getElementById('gd_disc_amount').value=amt;
  updateGoodsPricePreview();
};
window.gdDiscAmountChange=(el)=>{
  const total=gdCartTotal();
  const amt=Math.max(0,Math.min(total,+el.value||0));
  const pct = total? +(amt/total*100).toFixed(1) : 0;
  document.getElementById('gd_disc_percent').value=pct;
  updateGoodsPricePreview();
};
function onGoodsCartChange(){
  // giữ nguyên % chiết khấu hiện tại, tính lại số tiền chiết khấu theo tổng mới
  const total=gdCartTotal();
  const pct=+((document.getElementById('gd_disc_percent')||{}).value)||0;
  const amt=Math.round(total*pct/100);
  const amtEl=document.getElementById('gd_disc_amount');
  if(amtEl) amtEl.value=amt;
  updateGoodsPricePreview();
}
window.updateGoodsPricePreview=()=>{
  const total=gdCartTotal();
  const amt=+((document.getElementById('gd_disc_amount')||{}).value)||0;
  const final=Math.max(0,total-amt);
  const el=document.getElementById('gd_price_preview');
  if(el) el.innerHTML = `Tổng tiền hàng: <b>${vnd(total)}</b> → Sau chiết khấu: <b>${vnd(final)}</b>`;
};
window.toggleGdCustMode=(mode)=>{
  document.getElementById('gdCustExistingWrap').classList.toggle('hidden',mode==='new');
  document.getElementById('gdCustNewWrap').classList.toggle('hidden',mode!=='new');
};
window.submitGoods=()=>{
  if(!gdCart.length){toast('⚠️ Vui lòng thêm ít nhất 1 hàng hóa vào giỏ');return;}
  const custMode=document.querySelector('input[name="gdCustMode"]:checked').value;
  let custName;
  if(custMode==='new'){
    custName=document.getElementById('gd_cust_name').value.trim();
    if(!custName){toast('⚠️ Vui lòng nhập tên khách hàng mới');return;}
    const custId=Math.max(0,...state.customers.map(c=>c.id))+1;
    state.customers.push({id:custId,name:custName,phone:document.getElementById('gd_cust_phone').value,address:'',email:'',tier:'Silver',points:0,bookings:[],history:[]});
  } else {
    const custId=+document.getElementById('gd_cust_select').value;
    custName=ownerById(custId).name;
  }
  const branch=document.getElementById('gd_branch').value;
  const total=gdCartTotal();
  const discPercent=+document.getElementById('gd_disc_percent').value||0;
  const discAmount=Math.min(total,+document.getElementById('gd_disc_amount').value||0);
  // Phân bổ chiết khấu theo tỷ trọng giá trị từng mặt hàng trong giỏ (dòng cuối nhận phần dư để tổng khớp tuyệt đối)
  let remainingDisc=discAmount;
  gdCart.forEach((it,idx)=>{
    const r=state.retail.find(x=>x.id===it.retailId); if(!r) return;
    const rv=retailView(r);
    const lineTotal=rv.sellPrice*it.qty;
    const isLast = idx===gdCart.length-1;
    const lineDisc = isLast ? remainingDisc : (total? Math.round(lineTotal/total*discAmount) : 0);
    remainingDisc -= lineDisc;
    const finalLine=Math.max(0,lineTotal-lineDisc);
    const oid=Math.max(...state.orders.map(o=>o.id))+1;
    state.orders.push({id:oid,service:'[Hàng hóa] '+rv.name+' x'+it.qty,price:finalLine,branch,customer:custName,date:TODAY,status:'Hoàn thành',staff:currentUser.name,
      type:'hangban',refName:rv.name,originalPrice:lineTotal,discountAmount:lineDisc,discountPercent:discPercent});
    const w=warehouseById(r.warehouseId); if(w) w.stock=Math.max(0,w.stock-it.qty);
  });
  gdCart=[];
  closeModal();
  toast('✅ Đã bán hàng cho '+custName);
  renderSection('phucvukh');
};

window.saveBranch=()=>{
  const name=document.getElementById('br_name').value.trim();
  if(!name){toast('⚠️ Nhập tên cơ sở');return;}
  if(state.branches.some(b=>b.name===name)){toast('⚠️ Tên cơ sở đã tồn tại');return;}
  const id=state.branches.length?Math.max(...state.branches.map(b=>b.id))+1:1;
  state.branches.push({id,name,address:document.getElementById('br_addr').value});
  closeModal(); toast('✅ Đã thêm cơ sở'); renderSection('coso');
};
window.editBranch=(id)=>{
  const b=state.branches.find(x=>x.id===id);
  openModal(`<button class="modal-close" onclick="closeModal()">✕</button>
  <h3>✏️ Sửa cơ sở</h3>
  <label class="f">Tên cơ sở</label><input type="text" id="ebr_name" style="width:100%" value="${b.name}">
  <label class="f" style="margin-top:10px;">Địa chỉ</label><input type="text" id="ebr_addr" style="width:100%" value="${b.address}">
  <div style="margin-top:16px;text-align:right;"><button class="btn primary" onclick="saveEditBranch(${id})">Cập nhật</button></div>`);
};
window.saveEditBranch=(id)=>{
  const b=state.branches.find(x=>x.id===id);
  const name=document.getElementById('ebr_name').value.trim();
  if(!name){toast('⚠️ Tên cơ sở không được để trống');return;}
  const oldName=b.name;
  if(state.branches.some(x=>x.id!==id && x.name===name)){toast('⚠️ Tên cơ sở đã tồn tại');return;}
  b.name=name; b.address=document.getElementById('ebr_addr').value;
  // Đồng bộ tên cơ sở mới sang các bản ghi đang tham chiếu theo tên cũ
  if(oldName!==name){
    state.staff.forEach(s=>{if(s.branch===oldName)s.branch=name;});
    state.orders.forEach(o=>{if(o.branch===oldName)o.branch=name;});
    state.expenses.forEach(e=>{if(e.branch===oldName)e.branch=name;});
  }
  closeModal(); toast('✅ Đã cập nhật cơ sở'); renderSection('coso');
};
window.deleteBranch=(id)=>{
  const b=state.branches.find(x=>x.id===id);
  const inUse = state.staff.some(s=>s.branch===b.name) || state.orders.some(o=>o.branch===b.name) || state.expenses.some(e=>e.branch===b.name);
  if(inUse){toast('⚠️ Cơ sở "'+b.name+'" đang được dùng bởi nhân viên/đơn hàng/chi phí — không thể xóa.');return;}
  if(!confirm('Xóa cơ sở "'+b.name+'"?')) return;
  state.branches=state.branches.filter(x=>x.id!==id);
  toast('🗑️ Đã xóa cơ sở'); renderSection('coso');
};

function nhanvienBody(){
  const from=document.getElementById('nv_from')?document.getElementById('nv_from').value:'2026-06-01';
  const to=document.getElementById('nv_to')?document.getElementById('nv_to').value:'2026-07-05';

function staffRow(s,from,to){
  const myOrders=state.orders.filter(o=>o.staff===s.name && o.status!=='Đã huỷ' && o.date>=from && o.date<=to);
  const svcRevenue=myOrders.filter(o=>o.type==='dichvu').reduce((sum,o)=>sum+o.price,0);
  const goodsRevenue=myOrders.filter(o=>o.type==='hangban').reduce((sum,o)=>sum+o.price,0);
  const commission=myOrders.reduce((sum,o)=>sum+orderCommission(o),0);
  return `<tr>
    <td><b>${s.name}</b><div class="muted small">${s.phone}</div></td>
    <td>${s.username?`<span class="pill ok">@${s.username}</span>`:`<span class="pill">Chưa có</span>`}</td>
    <td>${s.position}</td><td>${s.branch}</td>
    <td class="mono">${vnd(s.baseSalary)}</td>
    <td class="mono">${vnd(svcRevenue)}</td>
    <td class="mono">${vnd(goodsRevenue)}</td>
    <td class="mono">${vnd(commission)}</td>
    <td class="flex gap8"><button class="btn ghost sm" onclick="editStaff(${s.id})">Sửa</button><button class="btn ghost sm" onclick="deleteStaff(${s.id})">Xóa</button></td>
  </tr>`;
}

/* ---- QUẢN LÝ KHÁCH SẠN (theo dõi ký gửi thú cưng, lịch sử lưu trú & chi phí) ----
   Giá khách sạn dùng chung cơ chế Combo (nhóm 'khach_san' trong COMBO_GROUPS/COMBO_PRICING)
   nên có thể điều chỉnh giá/hoa hồng trực tiếp ở trang "Quản lý dịch vụ" — áp dụng ngay
   cho các lượt ký gửi mới mà không cần sửa code. */
function hotelDaysBetween(checkIn, checkOutOrToday){
  const a=new Date(checkIn+'T00:00:00'), b=new Date(checkOutOrToday+'T00:00:00');
  const diff=Math.round((b-a)/86400000);
  return Math.max(1, diff+1); // tính luôn ngày nhận, tối thiểu 1 ngày
}
function hsSelectedService(){
  const petTypeEl=document.getElementById('hs_pet_type');
  const tierEl=document.getElementById('hs_tier');
  if(!petTypeEl||!tierEl) return null;
  return state.services.find(s=>s.comboGroup==='khach_san' && s.petType===petTypeEl.value && s.tier===tierEl.value);
}
function hotelServiceFor(stay){
  return state.services.find(s=>s.comboGroup==='khach_san' && s.petType===stay.petType && s.tier===stay.tier);
}

  const from=document.getElementById('hs_from')?document.getElementById('hs_from').value:'2026-06-01';

      const days=hotelDaysBetween(s.checkIn,s.checkOut);
      return `<tr data-key="${((p?p.name:'')+' '+(o?o.name:'')).toLowerCase()}">

        <td class="mono">${days}</td><td class="mono">${vnd(s.pricePerDay)}</td>

        <td class="mono">${vnd(s.paid)}</td><td>${s.branch}</td>
      </tr>`;
    }).join('') : '<tr><td colspan="10" class="muted small">Không có lượt ký gửi nào trong khoảng đã chọn.</td></tr>'}
  </table></div></div>`;
}
window.openAddHotelStay=()=>{
  const myBranch=(state.staff.find(s=>s.id===currentUser.staffId)||{}).branch || branchNames()[0];
  openModal(`<button class="modal-close" onclick="closeModal()">✕</button>
  <h3>🏨 Ký gửi thú cưng mới</h3>
  <b>Khách hàng</b>
  <div class="flex gap8" style="margin:10px 0;">
    <label class="small"><input type="radio" name="hsCustMode" value="existing" checked onchange="toggleHsCustMode('existing')"> Khách đã có</label>
    <label class="small"><input type="radio" name="hsCustMode" value="new" onchange="toggleHsCustMode('new')"> Khách mới</label>
  </div>
  <div id="hsCustExistingWrap">
    <select id="hs_cust_select" style="width:100%" onchange="populateHsPetSelect()">
      ${state.customers.map(c=>`<option value="${c.id}">${c.name} · ${c.phone}</option>`).join('')}
    </select>
  </div>
  <div id="hsCustNewWrap" class="hidden">
    <div class="formgrid">
      <div class="field"><label class="f">Họ tên</label><input type="text" id="hs_cust_name" style="width:100%"></div>
      <div class="field"><label class="f">SĐT</label><input type="tel" id="hs_cust_phone" style="width:100%"></div>
    </div>
  </div>
  <div class="divider"></div>
  <b>Thú cưng</b>
  <div id="hsPetExistingWrap" style="margin-top:10px;">
    <select id="hs_pet_select" style="width:100%" onchange="toggleHsPetNew()"></select>
  </div>
  <div id="hsPetNewWrap" class="hidden" style="margin-top:10px;">
    <div class="formgrid">
      <div class="field"><label class="f">Tên thú cưng</label><input type="text" id="hs_pet_name" style="width:100%"></div>
      <div class="field"><label class="f">Giống</label><input type="text" id="hs_pet_breed" style="width:100%"></div>
    </div>
  </div>
  <div class="divider"></div>
  <b>Thông tin lưu trú</b>
  <div class="formgrid" style="margin-top:10px;">
    <div class="field"><label class="f">Ngày nhận</label><input type="date" id="hs_checkin" style="width:100%" value="${TODAY}"></div>
    <div class="field"><label class="f">Cơ sở</label><select id="hs_branch" style="width:100%">${branchNames().map(b=>`<option ${b===myBranch?'selected':''}>${b}</option>`).join('')}</select></div>
  </div>
  <div class="formgrid" style="margin-top:10px;">
    <div class="field"><label class="f">Loại thú cưng</label><select id="hs_pet_type" style="width:100%" onchange="onHsPetTypeChange()">${comboPetTypes('khach_san').map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
    <div class="field"><label class="f">Mốc cân nặng</label><select id="hs_tier" style="width:100%" onchange="onHsTierChange()"></select></div>
  </div>
  <div class="small muted" id="hs_price_preview" style="margin-top:6px;"></div>
  <label class="f" style="margin-top:10px;">Ghi chú</label><textarea id="hs_notes" style="width:100%" rows="2" placeholder="VD: chế độ ăn, thuốc men..."></textarea>
  <div style="margin-top:16px;text-align:right;"><button class="btn primary" onclick="saveHotelStay()">🏨 Nhận ký gửi</button></div>`);
  populateHsPetSelect();
  onHsPetTypeChange();
};
window.onHsPetTypeChange=()=>{
  const petType=document.getElementById('hs_pet_type').value;
  const tierSel=document.getElementById('hs_tier');
  const tiers=comboTiers('khach_san',petType);
  tierSel.innerHTML=tiers.map(t=>`<option value="${t.tier}">${t.tier} — ${vnd(t.price)}/ngày</option>`).join('');
  onHsTierChange();
};
window.onHsTierChange=()=>{
  const svc=hsSelectedService();
  document.getElementById('hs_price_preview').innerHTML = svc ? `Giá áp dụng: <b>${vnd(svc.price)}/ngày</b>` : 'Chưa chọn được mức giá phù hợp.';
};
window.toggleHsCustMode=(mode)=>{
  document.getElementById('hsCustExistingWrap').classList.toggle('hidden',mode==='new');
  document.getElementById('hsCustNewWrap').classList.toggle('hidden',mode!=='new');
  if(mode==='new'){
    document.getElementById('hsPetExistingWrap').classList.add('hidden');
    document.getElementById('hsPetNewWrap').classList.remove('hidden');
  } else {
    document.getElementById('hsPetExistingWrap').classList.remove('hidden');
    populateHsPetSelect();
  }
};
window.populateHsPetSelect=()=>{
  const sel=document.getElementById('hs_pet_select');
  const custId=+document.getElementById('hs_cust_select').value;
  const myPets=state.pets.filter(p=>p.ownerId===custId);
  sel.innerHTML = myPets.map(p=>`<option value="${p.id}">${p.name} (${p.breed})</option>`).join('') + `<option value="__new__">+ Thú cưng mới...</option>`;
  toggleHsPetNew();
};
window.toggleHsPetNew=()=>{
  const sel=document.getElementById('hs_pet_select');
  document.getElementById('hsPetNewWrap').classList.toggle('hidden', sel.value!=='__new__');
};
window.saveHotelStay=()=>{
  const custMode=document.querySelector('input[name="hsCustMode"]:checked').value;
  let custId;
  if(custMode==='new'){
    const custName=document.getElementById('hs_cust_name').value.trim();
    if(!custName){toast('⚠️ Vui lòng nhập tên khách hàng mới');return;}
    custId=Math.max(0,...state.customers.map(c=>c.id))+1;
    state.customers.push({id:custId,name:custName,phone:document.getElementById('hs_cust_phone').value,address:'',email:'',tier:'Silver',points:0,bookings:[],history:[]});
  } else {
    custId=+document.getElementById('hs_cust_select').value;
  }
  let petId, petSelVal=document.getElementById('hs_pet_select')?document.getElementById('hs_pet_select').value:'__new__';
  if(custMode==='new' || petSelVal==='__new__'){
    const petName=document.getElementById('hs_pet_name').value.trim();
    if(!petName){toast('⚠️ Vui lòng nhập tên thú cưng (mới)');return;}
    petId=Math.max(0,...state.pets.map(p=>p.id))+1;
    state.pets.push({id:petId,ownerId:custId,name:petName,breed:document.getElementById('hs_pet_breed').value,note:''});
  } else {
    petId=+petSelVal;
  }
  const svc=hsSelectedService();
  if(!svc){toast('⚠️ Vui lòng chọn Loại thú cưng / Mốc cân nặng hợp lệ');return;}
  const checkIn=document.getElementById('hs_checkin').value || TODAY;
  const branch=document.getElementById('hs_branch').value;
  const notes=document.getElementById('hs_notes').value;
  const id=Math.max(0,...state.hotelStays.map(s=>s.id))+1;
  state.hotelStays.push({id,petId,checkIn,checkOut:null,pricePerDay:svc.price,petType:svc.petType,tier:svc.tier,branch,notes,paid:0,discountAmount:0,discountPercent:0,orderId:null,status:'Đang lưu trú',staff:currentUser.name});
  closeModal(); toast('✅ Đã nhận ký gửi '+petById(petId).name); renderSection('khachsan');
};
window.openCheckoutHotelStay=(id)=>{
  const s=state.hotelStays.find(x=>x.id===id);
  const p=petById(s.petId);
  openModal(`<button class="modal-close" onclick="closeModal()">✕</button>
  <h3>✅ Trả thú cưng — ${p.name}</h3>
  <div class="small muted" style="margin-bottom:10px;">Nhận ngày ${s.checkIn} · ${s.petType||''}${s.tier?(' · '+s.tier):''} · ${vnd(s.pricePerDay)}/ngày</div>
  <label class="f">Ngày trả</label><input type="date" id="co_date" style="width:100%" value="${TODAY}" oninput="updateCheckoutPreview(${id})">
  <div class="formgrid" style="margin-top:10px;">
    <div class="field"><label class="f">Chiết khấu (%)</label><input type="number" id="co_disc_percent" value="0" min="0" max="100" style="width:100%" oninput="coDiscPercentChange(${id},this)"></div>
    <div class="field"><label class="f">Chiết khấu (số tiền)</label><input type="number" id="co_disc_amount" value="0" min="0" style="width:100%" oninput="coDiscAmountChange(${id},this)"></div>
  </div>
  <div class="small muted" id="co_preview" style="margin-top:8px;"></div>
  <div style="margin-top:16px;text-align:right;"><button class="btn primary" onclick="confirmCheckoutHotelStay(${id})">💵 Xác nhận thanh toán &amp; trả thú cưng</button></div>`);
  updateCheckoutPreview(id);
};
function coComputeTotal(id){
  const s=state.hotelStays.find(x=>x.id===id);
  const coDate=document.getElementById('co_date').value || TODAY;
  const days=hotelDaysBetween(s.checkIn,coDate);
  return {days, total: days*s.pricePerDay};
}
function renderCoPreview(days,total,amt){
  const final=Math.max(0,total-amt);
  document.getElementById('co_preview').innerHTML=`Số ngày lưu trú: <b>${days}</b> → Tổng trước chiết khấu: <b>${vnd(total)}</b> → Sau chiết khấu: <b>${vnd(final)}</b>`;
}
window.updateCheckoutPreview=(id)=>{
  const {days,total}=coComputeTotal(id);
  const pct=+document.getElementById('co_disc_percent').value||0;
  const amt=Math.round(total*pct/100);
  document.getElementById('co_disc_amount').value=amt;
  renderCoPreview(days,total,amt);
};
window.coDiscPercentChange=(id,el)=>{
  const {days,total}=coComputeTotal(id);
  const pct=Math.min(100,Math.max(0,+el.value||0));
  const amt=Math.round(total*pct/100);
  document.getElementById('co_disc_amount').value=amt;
  renderCoPreview(days,total,amt);
};
window.coDiscAmountChange=(id,el)=>{
  const {days,total}=coComputeTotal(id);
  const amt=Math.max(0,Math.min(total,+el.value||0));
  const pct = total? +(amt/total*100).toFixed(1) : 0;
  document.getElementById('co_disc_percent').value=pct;
  renderCoPreview(days,total,amt);
};
window.confirmCheckoutHotelStay=(id)=>{
  const s=state.hotelStays.find(x=>x.id===id);
  const p=petById(s.petId), o=ownerById(p.ownerId);
  const coDate=document.getElementById('co_date').value || TODAY;
  if(coDate<s.checkIn){toast('⚠️ Ngày trả không được sớm hơn ngày nhận');return;}
  const days=hotelDaysBetween(s.checkIn,coDate);
  const total=days*s.pricePerDay;
  const discAmount=Math.min(total,+document.getElementById('co_disc_amount').value||0);
  const discPercent=+document.getElementById('co_disc_percent').value||0;
  const finalTotal=Math.max(0,total-discAmount);

  const hsvc=hotelServiceFor(s);
  const svcName = hsvc ? hsvc.name : `Khách sạn / Ngày — ${s.petType||''} — ${s.tier||''}`;

  const orderId=Math.max(...state.orders.map(x=>x.id))+1;
  state.orders.push({id:orderId,service:svcName,price:finalTotal,branch:s.branch,customer:o.name,date:coDate,status:'Hoàn thành',staff:currentUser.name,
    type:'dichvu',refName:svcName,originalPrice:total,discountAmount:discAmount,discountPercent:discPercent});
  if(hsvc) hsvc.used++;

  s.checkOut=coDate; s.paid=finalTotal; s.discountAmount=discAmount; s.discountPercent=discPercent; s.orderId=orderId; s.status='Đã trả';

  closeModal(); toast('✅ Đã trả '+p.name+' — thu '+vnd(finalTotal)); renderSection('khachsan');
};


/* ---- QUẢN LÝ TÀI KHOẢN (admin only) — đổi username/password của admin & nhân viên ---- */
RENDER.taikhoan = () => {
  const adminUser = users.find(u=>u.role==='admin');
  const rows = [{ key:'admin', name:adminUser.name, role:'Quản trị viên (Admin)', username:adminUser.username, password:adminUser.password, staffId:null }]
    .concat(state.staff.map(s=>{
      const u=users.find(x=>x.staffId===s.id);
      return { key:'staff', name:s.name, role:s.position, username:u?u.username:'', password:u?u.password:'', staffId:s.id };
    }));
  return `
  <div class="toolbar">
    <div class="small muted">Đổi tên đăng nhập và mật khẩu cho tài khoản Admin và toàn bộ tài khoản Nhân viên. Mật khẩu hiển thị trực tiếp để dễ theo dõi/chỉnh sửa.</div>
  </div>
  <div class="tblwrap"><div class="scroller"><table>
    <tr><th>Tên</th><th>Vai trò</th><th>Tài khoản</th><th>Mật khẩu</th><th></th></tr>
    ${rows.map(r=>`<tr>
      <td><b>${r.name}</b></td><td>${r.role}</td>
      <td>${r.username?`<span class="pill ok">@${r.username}</span>`:`<span class="pill">Chưa có tài khoản</span>`}</td>
      <td>${r.username?`<span class="mono">${r.password}</span>`:'—'}</td>
      <td>${r.key==='admin'?`<button class="btn ghost sm" onclick="editAdminAccount()">Đổi tên/mật khẩu</button>`
           : r.username?`<button class="btn ghost sm" onclick="editStaffAccount(${r.staffId})">Đổi tên/mật khẩu</button>`
           : `<button class="btn ghost sm" onclick="createStaffAccount(${r.staffId})">+ Tạo tài khoản</button>`}</td>
    </tr>`).join('')}
  </table></div></div>`;
};
window.editAdminAccount=()=>{
  const u=users.find(x=>x.role==='admin');
  openModal(`<button class="modal-close" onclick="closeModal()">✕</button>
  <h3>🔑 Đổi tài khoản Admin</h3>
  <label class="f">Tên đăng nhập</label><input type="text" id="ua_user" style="width:100%" value="${u.username}">
  <label class="f" style="margin-top:10px;">Mật khẩu</label><input type="text" id="ua_pass" style="width:100%" value="${u.password}">
  <div style="margin-top:16px;text-align:right;"><button class="btn primary" onclick="saveAdminAccount()">Cập nhật</button></div>`);
};
window.saveAdminAccount=()=>{
  const u=users.find(x=>x.role==='admin');
  const username=document.getElementById('ua_user').value.trim();
  if(!username){toast('⚠️ Tên đăng nhập không được để trống');return;}
  if(users.some(x=>x.username===username && x!==u)){toast('⚠️ Tên đăng nhập đã tồn tại');return;}
  u.username=username;
  const pass=document.getElementById('ua_pass').value;
  if(pass) u.password=pass;
  closeModal(); toast('✅ Đã cập nhật tài khoản Admin'); renderSection('taikhoan');
};
window.editStaffAccount=(staffId)=>{
  const s=state.staff.find(x=>x.id===staffId);
  const u=users.find(x=>x.staffId===staffId);
  openModal(`<button class="modal-close" onclick="closeModal()">✕</button>
  <h3>🔑 Đổi tài khoản — ${s.name}</h3>
  <label class="f">Tên đăng nhập</label><input type="text" id="us_user" style="width:100%" value="${u.username}">
  <label class="f" style="margin-top:10px;">Mật khẩu</label><input type="text" id="us_pass" style="width:100%" value="${u.password}">
  <div style="margin-top:16px;text-align:right;"><button class="btn primary" onclick="saveStaffAccount(${staffId})">Cập nhật</button></div>`);
};
window.saveStaffAccount=(staffId)=>{
  const s=state.staff.find(x=>x.id===staffId);
  const u=users.find(x=>x.staffId===staffId);
  const username=document.getElementById('us_user').value.trim();
  if(!username){toast('⚠️ Tên đăng nhập không được để trống');return;}
  if(users.some(x=>x.username===username && x!==u)){toast('⚠️ Tên đăng nhập đã tồn tại');return;}
  u.username=username; s.username=username;
  const pass=document.getElementById('us_pass').value;
  if(pass) u.password=pass;
  closeModal(); toast('✅ Đã cập nhật tài khoản của '+s.name); renderSection('taikhoan');
};
window.createStaffAccount=(staffId)=>{
  const s=state.staff.find(x=>x.id===staffId);
  openModal(`<button class="modal-close" onclick="closeModal()">✕</button>
  <h3>+ Tạo tài khoản — ${s.name}</h3>
  <label class="f">Tên đăng nhập</label><input type="text" id="nc_user" style="width:100%">
  <label class="f" style="margin-top:10px;">Mật khẩu</label><input type="text" id="nc_pass" style="width:100%" value="123456">
  <div style="margin-top:16px;text-align:right;"><button class="btn primary" onclick="saveNewStaffAccount(${staffId})">Tạo tài khoản</button></div>`);
};
window.saveNewStaffAccount=(staffId)=>{
  const s=state.staff.find(x=>x.id===staffId);
  const username=document.getElementById('nc_user').value.trim();
  if(!username){toast('⚠️ Nhập tên đăng nhập');return;}
  if(users.some(u=>u.username===username)){toast('⚠️ Tên đăng nhập đã tồn tại');return;}
  users.push({username,password:document.getElementById('nc_pass').value||'123456',role:'staff',name:s.name,staffId});
  s.username=username;
  closeModal(); toast('✅ Đã tạo tài khoản cho '+s.name); renderSection('taikhoan');
};

/* ============================= ROUTER ============================= */
function renderSection(id){
  document.getElementById('content').innerHTML = RENDER[id] ? RENDER[id]() : `<div class="card">Đang phát triển...</div>`;
}
</script>
</body>
</html>
