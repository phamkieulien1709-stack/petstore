<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPET × PAPET — Quản Lý Nội Bộ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6F0;
  --surface:#FFFFFF;
  --ink:#16302C;
  --ink-soft:#4E6461;
  --muted:#7C8B87;
  --line:#E2E6DC;
  --sidebar:#123330;
  --sidebar-soft:#1D4642;
  --sidebar-line:#2A524D;
  --sidebar-text:#BFD8D2;
  --accent:#F2637B;
  --accent-ink:#7A1F30;
  --accent-soft:#FDE4E9;
  --marigold:#E8A33D;
  --marigold-soft:#FBEBD1;
  --teal:#2F8F7A;
  --teal-soft:#DCF0E9;
  --blue:#4C86C9;
  --blue-soft:#E1EBF7;
  --red:#E0554B;
  --red-soft:#FBE3E1;
  --radius:14px;
  --shadow: 0 1px 2px rgba(18,51,48,.06), 0 8px 24px -12px rgba(18,51,48,.18);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
.app{display:flex;min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:266px;flex:none;background:var(--sidebar);color:var(--sidebar-text);
  padding:22px 14px 24px;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 10px 20px;}
.brand-mark{
  width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),#F5899C);
  display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;
  box-shadow:0 4px 10px -3px rgba(242,99,123,.6);
}
.brand-text{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16.5px;color:#fff;line-height:1.15;}
.brand-text span{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:10.5px;letter-spacing:.09em;color:var(--sidebar-text);text-transform:uppercase;margin-top:2px;}
.nav-group{margin-bottom:6px;}
.nav-label{font-size:10.5px;font-weight:700;letter-spacing:.11em;color:#7FA39C;padding:14px 12px 6px;text-transform:uppercase;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;
  font-size:13.6px;font-weight:500;color:var(--sidebar-text);margin-bottom:2px;transition:background .15s,color .15s;
}
.nav-item .ic{font-size:15px;width:18px;text-align:center;flex:none;}
.nav-item:hover{background:var(--sidebar-soft);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;}
.sidebar-foot{margin-top:16px;padding:12px;border-top:1px solid var(--sidebar-line);display:flex;gap:10px;align-items:center;}
.avatar-sm{width:32px;height:32px;border-radius:50%;background:var(--marigold);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Baloo 2';color:#4A2F04;flex:none;font-size:13px;}
.foot-name{font-size:12.5px;font-weight:600;color:#fff;}
.foot-role{font-size:11px;color:var(--sidebar-text);}

/* ---------- MAIN ---------- */
.main{flex:1;min-width:0;}
.topbar{
  position:sticky;top:0;z-index:5;background:rgba(244,246,240,.92);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line);
}
.page-title{font-family:'Baloo 2';font-weight:700;font-size:21px;}
.page-sub{font-size:12.5px;color:var(--muted);margin-top:1px;}
.top-actions{display:flex;align-items:center;gap:14px;}
.branch-switch{
  font-family:'Inter';font-size:12.5px;font-weight:600;background:#fff;border:1px solid var(--line);
  border-radius:9px;padding:7px 10px;color:var(--ink-soft);cursor:pointer;
}
.bell{position:relative;width:36px;height:36px;border-radius:10px;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;}
.bell .dot{position:absolute;top:6px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid #fff;}
.content{padding:26px 28px 60px;max-width:1320px;}
.section{display:none;}
.section.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

h2.h{font-family:'Baloo 2';font-size:17px;font-weight:700;margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
h2.h:first-child{margin-top:0;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;display:block;}

/* Cards / KPI grid */
.grid{display:grid;gap:14px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1050px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
.kpi .icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px;}
.kpi .val{font-family:'JetBrains Mono';font-weight:600;font-size:22px;letter-spacing:-.01em;}
.kpi .lbl{font-size:12px;color:var(--muted);margin-top:3px;}
.kpi .delta{font-size:11.5px;font-weight:600;margin-top:8px;display:inline-block;padding:2px 7px;border-radius:6px;}
.up{color:var(--teal);background:var(--teal-soft);}
.down{color:var(--red);background:var(--red-soft);}

.bg-pink{background:var(--accent-soft);color:var(--accent-ink);}
.bg-teal{background:var(--teal-soft);color:#175A49;}
.bg-blue{background:var(--blue-soft);color:#1F4E82;}
.bg-marigold{background:var(--marigold-soft);color:#7A5111;}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:9px 10px;border-bottom:1.5px solid var(--line);}
td{padding:10px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.tblwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.tblwrap .scroller{overflow-x:auto;}

/* pill / badge */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:100px;white-space:nowrap;}
.pill.silver{background:#EDEFEA;color:#5B6660;}
.pill.gold{background:var(--marigold-soft);color:#8A5C0C;}
.pill.platinum{background:#E7ECF7;color:#33447A;}
.pill.diamond{background:#E4F1FB;color:#0E5C8C;}
.pill.status-cho{background:#EFEFEF;color:#666;}
.pill.status-tam{background:var(--blue-soft);color:#1F4E82;}
.pill.status-say{background:var(--marigold-soft);color:#8A5C0C;}
.pill.status-cat{background:var(--accent-soft);color:var(--accent-ink);}
.pill.status-xong{background:var(--teal-soft);color:#175A49;}
.pill.ok{background:var(--teal-soft);color:#175A49;}
.pill.warn{background:var(--marigold-soft);color:#8A5C0C;}
.pill.danger{background:var(--red-soft);color:#A3271F;}

/* buttons */
.btn{font-family:'Inter';font-weight:600;font-size:12.5px;border:none;border-radius:9px;padding:8px 14px;cursor:pointer;transition:filter .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);color:#fff;}
.btn.primary:hover{filter:brightness(1.05);}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);}
.btn.ghost:hover{background:#F4F6F0;}
.btn.sm{padding:5px 9px;font-size:11.5px;border-radius:7px;}
.btn.teal{background:var(--teal);color:#fff;}
.btn.dark{background:var(--sidebar);color:#fff;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:12.5px;min-width:230px;}
.search input{border:none;outline:none;font-family:'Inter';font-size:12.5px;flex:1;background:transparent;}
select,input[type=text],input[type=number],textarea{
  font-family:'Inter';font-size:12.5px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);outline:none;
}
select:focus,input:focus,textarea:focus{border-color:var(--accent);}
label.f{font-size:11.5px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px;}

/* toast */
#toast{position:fixed;bottom:22px;right:22px;background:var(--sidebar);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 10px 30px -8px rgba(0,0,0,.4);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:99;display:flex;align-items:center;gap:8px;}
#toast.show{opacity:1;transform:none;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(16,35,32,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:86vh;overflow-y:auto;padding:22px 24px;box-shadow:0 30px 60px -20px rgba(0,0,0,.35);}
.modal h3{font-family:'Baloo 2';margin:0 0 14px;font-size:18px;}
.modal-close{float:right;cursor:pointer;background:#F1F1EC;border:none;width:28px;height:28px;border-radius:8px;font-size:14px;}

/* misc */
.muted{color:var(--muted);}
.divider{height:1px;background:var(--line);margin:16px 0;}
.flex{display:flex;}
.gap8{gap:8px;}
.gap10{gap:10px;}
.wrap{flex-wrap:wrap;}
.between{justify-content:space-between;}
.center{align-items:center;}
.mono{font-family:'JetBrains Mono';}
.small{font-size:11.5px;}
.bold{font-weight:700;}
a.linklike{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none;}
a.linklike:hover{text-decoration:underline;}

/* kanban (grooming) */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto;}
@media(max-width:1050px){.kanban{grid-template-columns:repeat(5,220px);}}
.kcol{background:#EFF2E9;border-radius:12px;padding:10px;min-height:120px;}
.kcol h4{font-size:12px;margin:2px 6px 8px;display:flex;justify-content:space-between;color:var(--ink-soft);}
.kcard{background:#fff;border-radius:10px;padding:10px;margin-bottom:8px;box-shadow:var(--shadow);font-size:12.5px;}
.kcard .name{font-weight:700;margin-bottom:2px;}
.kcard .meta{color:var(--muted);font-size:11px;margin-bottom:8px;}
.kcard select{width:100%;}

/* hotel room grid */
.rooms{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
@media(max-width:900px){.rooms{grid-template-columns:repeat(3,1fr);}}
.room{border-radius:12px;padding:12px 10px;cursor:pointer;border:1.5px solid var(--line);background:#fff;transition:transform .12s;}
.room:hover{transform:translateY(-2px);}
.room.occupied{background:var(--accent-soft);border-color:#F5B6C2;}
.room.empty{background:#F0F3EB;}
.room .rid{font-family:'Baloo 2';font-weight:700;font-size:13px;}
.room .rstat{font-size:10.5px;color:var(--muted);margin-top:2px;}
.room .rpet{font-size:12px;margin-top:6px;font-weight:600;}

/* pos */
.pos-grid{display:grid;grid-template-columns:1fr 320px;gap:16px;}
@media(max-width:950px){.pos-grid{grid-template-columns:1fr;}}
.prod{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:#fff;cursor:pointer;}
.prod:hover{border-color:var(--accent);}
.cart-item{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--line);}
.stepper{display:flex;align-items:center;gap:6px;}
.stepper button{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:700;}

/* bars */
.barrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.barrow .lbl{width:110px;font-size:12px;flex:none;color:var(--ink-soft);}
.bartrack{flex:1;height:12px;border-radius:8px;background:#EFF2E9;overflow:hidden;}
.barfill{height:100%;border-radius:8px;}
.barrow .val{width:90px;text-align:right;font-family:'JetBrains Mono';font-size:12px;flex:none;}

/* sticky notes */
.notes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:1050px){.notes-grid{grid-template-columns:repeat(2,1fr);}}
.note{background:#FBF3D6;border-radius:10px;padding:14px;font-size:12.8px;position:relative;min-height:90px;box-shadow:0 4px 10px -4px rgba(0,0,0,.15);}
.note:nth-child(3n+2){background:var(--accent-soft);}
.note:nth-child(3n){background:var(--teal-soft);}
.note .del{position:absolute;top:6px;right:8px;cursor:pointer;color:rgba(0,0,0,.35);font-size:12px;background:none;border:none;}

/* permission matrix */
.perm-table td, .perm-table th{text-align:center;}
.perm-table td:first-child, .perm-table th:first-child{text-align:left;}
.chk{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}

/* notif list */
.notif{display:flex;gap:10px;padding:12px;border-radius:10px;margin-bottom:8px;background:#fff;border:1px solid var(--line);}
.notif.unread{border-left:3px solid var(--accent);}
.notif .ic{font-size:16px;}
.notif .txt{font-size:12.8px;}
.notif .time{font-size:11px;color:var(--muted);margin-top:2px;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#D6DACC;border-radius:8px;}
</style>
</head>

function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=msg; t.classList.add('show');
  clearTimeout(window.__tt); window.__tt=setTimeout(()=>t.classList.remove('show'),2400);
}
function openModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modalBg').classList.add('show');}
function closeModal(){document.getElementById('modalBg').classList.remove('show');}

/* ============================= SIDEBAR RENDER ============================= */
function renderSidebar(active){
  const sb=document.getElementById('sidebar');
  let html=`<div class="brand"><div class="brand-mark">🐾</div><div class="brand-text">CPET × PAPET<span>Quản lý nội bộ</span></div></div>`;
  NAV.forEach(g=>{
    html+=`<div class="nav-group"><div class="nav-label">${g.label}</div>`;
    g.items.forEach(it=>{
      html+=`<div class="nav-item ${it.id===active?'active':''}" data-nav="${it.id}"><span class="ic">${it.icon}</span>${it.label}</div>`;
    });
    html+=`</div>`;
  });
  html+=`<div class="sidebar-foot"><div class="avatar-sm">FD</div><div><div class="foot-name">Founder Demo</div><div class="foot-role">Toàn quyền truy cập</div></div></div>`;
  sb.innerHTML=html;
  sb.querySelectorAll('[data-nav]').forEach(el=>el.addEventListener('click',()=>goTo(el.dataset.nav)));
}

function goTo(id){
  document.getElementById('pageTitle').textContent=TITLES[id][0];
  document.getElementById('pageSub').textContent=TITLES[id][1];
  renderSidebar(id);
  renderSection(id);
}

RENDER.pos = () => {
  return `
  <div class="pos-grid">
    <div>
      <div class="search" style="margin-bottom:12px;">🔎 <input placeholder="Tìm sản phẩm..." oninput="filterPos(this.value)"></div>
      <div id="prodList">${state.products.map(prodRow).join('')}</div>
    </div>
    <div class="card">
      <b>🧾 Giỏ hàng</b>
      <div id="cartList" style="margin-top:10px;">${renderCart()}</div>
      <div class="divider"></div>
      <div class="flex between bold"><span>Tổng cộng</span><span class="mono">${vnd(cartTotal())}</span></div>
      <button class="btn primary" style="width:100%;margin-top:12px;justify-content:center;" onclick="checkout()">Thanh toán</button>
    </div>
  </div>`;
};
function prodRow(p){
  return `<div class="prod" data-name="${p.name.toLowerCase()}" onclick="addToCart(${p.id})">
    <div><b>${p.name}</b><div class="muted small">${p.cat}${p.stock!==null?' · Còn '+p.stock:''}</div></div>
    <div class="mono">${vnd(p.price)}</div>
  </div>`;
}
window.filterPos=(q)=>{
  q=q.toLowerCase();
  document.querySelectorAll('#prodList .prod').forEach(el=>{el.style.display=el.dataset.name.includes(q)?'':'none';});
};
window.addToCart=(id)=>{
  const line=state.cart.find(c=>c.id===id);
  if(line)line.qty++; else state.cart.push({id,qty:1});
  document.getElementById('cartList').innerHTML=renderCart();
  updateCartTotal();
};
function renderCart(){
  if(!state.cart.length) return `<div class="muted small">Chưa có sản phẩm nào trong giỏ.</div>`;
  return state.cart.map(c=>{
    const p=state.products.find(x=>x.id===c.id);
    return `<div class="cart-item">
      <span>${p.name}</span>
      <div class="stepper">
        <button onclick="qtyCart(${c.id},-1)">–</button><span class="mono">${c.qty}</span><button onclick="qtyCart(${c.id},1)">+</button>
      </div>
    </div>`;
  }).join('');
}
window.qtyCart=(id,d)=>{
  const line=state.cart.find(c=>c.id===id); line.qty+=d;
  if(line.qty<=0) state.cart=state.cart.filter(c=>c.id!==id);
  document.getElementById('cartList').innerHTML=renderCart();
  updateCartTotal();
};
function cartTotal(){return state.cart.reduce((s,c)=>s+c.qty*state.products.find(p=>p.id===c.id).price,0);}
function updateCartTotal(){
  document.querySelectorAll('.pos-grid .card .flex.between.bold span.mono')[0].textContent=vnd(cartTotal());
}
window.checkout=()=>{
  if(!state.cart.length){toast('⚠️ Giỏ hàng đang trống');return;}
  state.revenueToday+=cartTotal();
  toast('✅ Thanh toán thành công — '+vnd(cartTotal())+' · +'+Math.round(cartTotal()/100000/2)+' điểm cho khách');
  state.cart=[];
  renderSection('pos');
};

  return `
  <div class="tblwrap"><div class="scroller"><table>
    <tr><th>Nhân viên</th><th>Vai trò</th><th>Chi nhánh</th><th>SĐT</th><th>Trạng thái hôm nay</th></tr>
    ${staff.map(s=>`<tr><td><b>${s.name}</b></td><td>${s.role}</td><td>${s.branch==='q1'?'Quận 1':'Quận 7'}</td><td>${s.phone}</td><td>${s.checked==='in'?'<span class="pill ok">Đang làm việc</span>':'<span class="pill">Đã tan ca</span>'}</td></tr>`).join('')}
  </table></div></div>
  <h2 class="h">📅 Lịch làm việc tuần này (mẫu)</h2>
  <div class="tblwrap"><div class="scroller"><table>
    <tr><th>Nhân viên</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th><th>T6</th><th>T7</th><th>CN</th></tr>
    ${state.staff.slice(0,4).map(s=>`<tr><td>${s.name}</td>${Array(7).fill(0).map((_,i)=>`<td>${i===5||i===6?'Nghỉ':'Ca ' + (i%2===0?'sáng':'chiều')}</td>`).join('')}</tr>`).join('')}
  </table></div></div>
  `;
};

/* ---- Attendance ---- */
RENDER.attendance = () => {
  return `
  <div class="tblwrap"><div class="scroller"><table>
    <tr><th>Nhân viên</th><th>Check-in</th><th>Check-out</th><th>Trạng thái</th><th></th></tr>
    ${state.staff.map(s=>`<tr>
      <td>${s.name}</td>
      <td class="mono">${s.checked==='in'?'08:0'+ (s.id%5) :'—'}</td>
      <td class="mono">${s.checked==='out'?'17:1'+(s.id%5):'—'}</td>
      <td>${s.checked==='in'?'<span class="pill ok">Đang làm</span>':'<span class="pill">Đã ra ca</span>'}</td>
      <td><button class="btn ghost sm" onclick="toggleAttendance(${s.id})">${s.checked==='in'?'Check-out':'Check-in'}</button></td>
    </tr>`).join('')}
  </table></div></div>
  <div class="grid cols-4" style="margin-top:16px;">
    ${kpiCard('✅','bg-teal',state.staff.filter(s=>s.checked==='in').length,'Đang làm việc','','up')}
    ${kpiCard('⏰','bg-marigold','1','Đi muộn hôm nay','','down')}
    ${kpiCard('🌴','bg-blue','0','Nghỉ phép hôm nay','','up')}
    ${kpiCard('🕐','bg-pink','3','Lượt tăng ca tuần này','','up')}
  </div>`;
};
window.toggleAttendance=(id)=>{
  const s=state.staff.find(x=>x.id===id); s.checked=s.checked==='in'?'out':'in';
  toast((s.checked==='in'?'✅ Check-in: ':'👋 Check-out: ')+s.name);
  renderSection('attendance');
};

/* ---- KPI ---- */
RENDER.kpi = () => {
  const ranked=[...state.staff].sort((a,b)=>b.kpi-a.kpi);
  return `
  <div class="tblwrap"><div class="scroller"><table>
    <tr><th>#</th><th>Nhân viên</th><th>Bộ phận</th><th>KPI tháng</th><th>Doanh thu đóng góp</th><th>Hoa hồng tạm tính</th></tr>
    ${ranked.map((s,i)=>`<tr>
      <td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
      <td>${s.name}</td><td>${s.role}</td>
      <td><span class="pill ${s.kpi>=90?'ok':s.kpi>=80?'warn':'danger'}">${s.kpi}%</span></td>
      <td class="mono">${vnd(s.revenue)}</td>
      <td class="mono">${vnd(Math.round(s.revenue*0.05))}</td>
    </tr>`).join('')}
  </table></div></div>
  <div class="grid cols-2" style="margin-top:16px;">
    <div class="card"><b>🏆 Thưởng tháng này</b><div class="small" style="margin-top:8px;">Nguyễn Thị Thảo — Thưởng nóng 500.000đ vì KPI &gt; 95%.</div></div>
    <div class="card"><b>⚠️ Nhắc nhở</b><div class="small" style="margin-top:8px;">Vũ Thị Hà — KPI dưới 85%, cần trao đổi trực tiếp.</div></div>
  </div>
  `;
};

/* ---- Incidents ---- */
RENDER.incidents = () => {
  return `
  <div class="toolbar">
    <div class="small muted">Ghi nhận nhanh mọi sự cố để đội ngũ theo dõi và xử lý kịp thời.</div>
    <button class="btn primary" onclick="openAddIncident()">+ Ghi nhận sự cố</button>
  </div>
  <div id="incList">${state.incidents.map(incRow).join('')}</div>
  `;
};
function incRow(i){
  const iconMap={'Pet bỏ ăn':'🍽️','Pet bị bệnh':'🤒','Tai nạn':'🚑','Khiếu nại':'📣','Sự cố nội bộ':'🛠️'};
  return `<div class="notif"><div class="ic">${iconMap[i.type]||'⚠️'}</div><div><div class="txt"><b>${i.type}</b>${i.pet!=='—'?' — '+i.pet:''}<br>${i.note}</div><div class="time">${i.date}</div></div></div>`;
}
window.openAddIncident=()=>{
  openModal(`<button class="modal-close" onclick="closeModal()">✕</button>
  <h3>+ Ghi nhận sự cố</h3>
  <label class="f">Loại sự cố</label>
  <select id="in_type" style="width:100%;"><option>Pet bỏ ăn</option><option>Pet bị bệnh</option><option>Tai nạn</option><option>Khiếu nại</option><option>Sự cố nội bộ</option></select>
  <label class="f" style="margin-top:10px;">Thú cưng liên quan (nếu có)</label>
  <input type="text" id="in_pet" style="width:100%;" placeholder="VD: Mochi">
  <label class="f" style="margin-top:10px;">Chi tiết</label>
  <textarea id="in_note" style="width:100%;height:70px;"></textarea>
  <div style="margin-top:16px;text-align:right;"><button class="btn primary" onclick="saveIncident()">Lưu</button></div>`);
};
window.saveIncident=()=>{
  const type=document.getElementById('in_type').value;
  const pet=document.getElementById('in_pet').value.trim()||'—';
  const note=document.getElementById('in_note').value.trim();
  if(!note){toast('⚠️ Vui lòng nhập chi tiết sự cố');return;}
  state.incidents.unshift({id:Date.now(),date:'2026-07-05',type,pet,note});
  closeModal(); toast('✅ Đã ghi nhận sự cố'); renderSection('incidents');
};

/* ---- Branches ---- */
RENDER.branches = () => `
  <div class="tblwrap"><div class="scroller"><table>
    <tr><th>Chỉ tiêu</th><th>Chi nhánh Quận 1</th><th>Chi nhánh Quận 7</th></tr>
    <tr><td>Doanh thu tháng</td><td class="mono">${vnd(312000000)}</td><td class="mono">${vnd(235000000)}</td></tr>
    <tr><td>KPI trung bình</td><td>92%</td><td>86%</td></tr>
    <tr><td>Giá trị tồn kho</td><td class="mono">${vnd(84000000)}</td><td class="mono">${vnd(61000000)}</td></tr>
    <tr><td>Số ca Grooming / tháng</td><td class="mono">410</td><td class="mono">298</td></tr>
    <tr><td>Công suất khách sạn</td><td>78%</td><td>65%</td></tr>
    <tr><td>Xếp hạng</td><td><span class="pill ok">🥇 #1</span></td><td><span class="pill gold">🥈 #2</span></td></tr>
  </table></div></div>
  <div class="card" style="margin-top:14px;"><b>🔄 Đề xuất chuyển kho</b><div class="small muted" style="margin-top:8px;">Chuyển 20 bao Cát vệ sinh mèo từ Quận 1 sang Quận 7 (đang thiếu hàng).</div></div>
`;

/* ---- Permissions ---- */
RENDER.permissions = () => {
  const roles=['Founder','Quản lý','Groomer','Hotel','Bán hàng','Marketing','CSKH'];
  const modules=['Dashboard','CRM & Khách hàng','Grooming','Khách sạn','POS & Kho','Tài chính','Nhân sự','Báo cáo'];
  const grant={Founder:Array(8).fill(1),Quảnlý:[1,1,1,1,1,1,1,1],'Quản lý':[1,1,1,1,1,1,1,1],Groomer:[1,0,1,0,0,0,0,0],Hotel:[1,0,0,1,0,0,0,0],'Bán hàng':[1,1,0,0,1,0,0,0],Marketing:[1,1,0,0,0,0,0,1],CSKH:[1,1,0,0,0,0,0,0]};
  return `
  <div class="tblwrap"><div class="scroller"><table class="perm-table">
    <tr><th>Vai trò</th>${modules.map(m=>`<th>${m}</th>`).join('')}</tr>
    ${roles.map(r=>`<tr><td><b>${r}</b></td>${grant[r].map(v=>`<td><input type="checkbox" class="chk" ${v?'checked':''} onclick="toast('🔐 Đã cập nhật quyền (demo)')"></td>`).join('')}</tr>`).join('')}
  </table></div></div>
  <div class="small muted" style="margin-top:10px;">Mỗi tài khoản chỉ nhìn thấy đúng các module được cấp quyền tương ứng với vai trò của mình.</div>
  `;
};

/* ---- Notifications ---- */
RENDER.notifications = () => {
  return `
  <div class="toolbar"><div class="small muted">${state.notifications.filter(n=>!n.read).length} thông báo chưa đọc</div>
    <button class="btn ghost" onclick="markAllRead()">Đánh dấu đã đọc tất cả</button></div>
  <div id="notifList">${state.notifications.map(notifRowClick).join('')}</div>
  `;
};
function notifRowClick(n){
  return `<div class="notif ${!n.read?'unread':''}" onclick="markRead(${n.id})" style="cursor:pointer;"><div class="ic">${n.ic}</div><div><div class="txt">${n.txt}</div><div class="time">${n.time}</div></div></div>`;
}
window.markRead=(id)=>{state.notifications.find(n=>n.id===id).read=true; renderSection('notifications'); updateBell();};
window.markAllRead=()=>{state.notifications.forEach(n=>n.read=true); renderSection('notifications'); updateBell();};
function updateBell(){
  const unread=state.notifications.filter(n=>!n.read).length;
  document.getElementById('bellDot').style.display = unread ? 'block' : 'none';
}

/* ---- Notes ---- */
RENDER.notes = () => {
  return `
  <div class="toolbar"><div class="small muted">Ghi chú nhanh, hiển thị cho toàn đội.</div>
    <button class="btn primary" onclick="addNote()">+ Thêm ghi chú</button></div>
  <div class="notes-grid" id="notesGrid">${state.notes.map(n=>`<div class="note"><button class="del" onclick="delNote(${n.id})">✕</button>${n.text}</div>`).join('')}</div>
  `;
};
window.addNote=()=>{
  const text=prompt('Nội dung ghi chú:');
  if(!text) return;
  state.notes.push({id:Date.now(),text});
  renderSection('notes');
};
window.delNote=(id)=>{state.notes=state.notes.filter(n=>n.id!==id); renderSection('notes');};

/* ============================= ROUTER ============================= */
function renderSection(id){
  document.getElementById('content').innerHTML = RENDER[id] ? RENDER[id]() : `<div class="card">Đang phát triển...</div>`;
}
document.getElementById('branchSwitch').addEventListener('change',e=>{
  state.branch=e.target.value;
  const active=document.querySelector('.nav-item.active');
  toast('🏢 Đang xem: '+(e.target.value==='all'?'Tất cả chi nhánh':e.target.options[e.target.selectedIndex].text));
  renderSection(active ? active.dataset.nav : 'dashboard');
});
document.getElementById('bellBtn').addEventListener('click',()=>goTo('notifications'));

/* ============================= INIT ============================= */
renderSidebar('dashboard');
renderSection('dashboard');
updateBell();
</script>
</body>
</html>
